<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Udhaar — SmartShop ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    nav a {
      font-size: 0.85rem;
      color: #6b7280;
      text-decoration: none;
      margin-left: 1.5rem;
    }

    nav a:hover { color: #111; }

    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .top-bar h2 { font-size: 1.2rem; font-weight: 600; }

    .summary-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .summary-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1rem 1.25rem;
    }

    .summary-card p {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 0.25rem;
    }

    .summary-card h3 { font-size: 1.2rem; font-weight: 600; }
    .summary-card h3.red { color: #dc2626; }

    .table-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }
    thead { background: #f9fafb; }

    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e5e7eb;
    }

    td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid #f3f4f6;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    .amount-due { color: #dc2626; font-weight: 600; }

    button {
      padding: 0.4rem 0.85rem;
      border: none;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 500;
    }

    .btn-primary { background: #111; color: white; }
    .btn-primary:hover { background: #333; }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: 0.9rem;
    }

    /* Payment Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 8px;
      width: 420px;
      padding: 1.5rem;
    }

    .modal h3 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .modal .due {
      font-size: 0.85rem;
      color: #dc2626;
      margin-bottom: 1.25rem;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }

    .form-group label {
      font-size: 0.8rem;
      color: #6b7280;
      font-weight: 500;
    }

    .form-group input,
    .form-group select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus { border-color: #111; }

    .modal-actions { display: flex; gap: 0.5rem; margin-top: 1rem; }

    .btn-secondary {
      background: #f3f4f6;
      color: #111;
      padding: 0.5rem 1rem;
    }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }

    .alert-error   { background: #fef2f2; color: #dc2626; display: block; }
    .alert-success { background: #f0fdf4; color: #16a34a; display: block; }

    /* Payment history panel */
    .history-panel {
      margin-top: 1.25rem;
      border-top: 1px solid #e5e7eb;
      padding-top: 1rem;
    }

    .history-panel h4 {
      font-size: 0.8rem;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      padding: 0.35rem 0;
      border-bottom: 1px solid #f3f4f6;
    }

    .history-item:last-child { border-bottom: none; }
    .history-item .paid { color: #16a34a; font-weight: 500; }
  </style>
</head>
<body>

<header>
  <h1>SmartShop ERP</h1>
  <nav>
    <a href="/pages/index.html">Home</a>
    <a href="/pages/products.html">Inventory</a>
    <a href="/pages/customers.html">Customers</a>
    <a href="/pages/billing.html">Billing</a>
    <a href="/pages/invoices.html">Invoices</a>
    <a href="/pages/udhaar.html">Udhaar</a>
  </nav>
</header>

<div class="container">
  <div class="top-bar">
    <h2>Udhaar (Credit)</h2>
  </div>

  <div id="alert" class="alert"></div>

  <div class="summary-row">
    <div class="summary-card">
      <p>Customers with Dues</p>
      <h3 id="creditCount">—</h3>
    </div>
    <div class="summary-card">
      <p>Total Outstanding</p>
      <h3 class="red" id="totalOutstanding">—</h3>
    </div>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Customer</th>
          <th>Phone</th>
          <th>Total Purchases</th>
          <th>Amount Due</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="creditList">
        <tr>
          <td colspan="5" class="empty-state">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Record Payment Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <h3 id="modalCustomerName">Record Payment</h3>
    <p class="due">Outstanding: ₹<span id="modalDue">0</span></p>

    <div id="modalAlert" class="alert"></div>

    <div class="form-group">
      <label>Payment Amount (₹)</label>
      <input type="number" id="payAmount" placeholder="Enter amount" min="1">
    </div>

    <div class="form-group">
      <label>Payment Method</label>
      <select id="payMethod">
        <option value="cash">Cash</option>
        <option value="upi">UPI</option>
      </select>
    </div>

    <div class="form-group">
      <label>Note (optional)</label>
      <input type="text" id="payNote" placeholder="e.g. Partial payment">
    </div>

    <div class="modal-actions">
      <button class="btn-primary" onclick="submitPayment()">Record Payment</button>
      <button class="btn-secondary" onclick="closeModalDirect()">Cancel</button>
    </div>

    <div class="history-panel">
      <h4>Payment History</h4>
      <div id="paymentHistory">
        <p style="font-size:0.8rem;color:#9ca3af;">Loading history...</p>
      </div>
    </div>
  </div>
</div>

<script src="/js/auth.js"></script>
<script>
  if (!requireAuth()) throw new Error('Not authenticated');

  let selectedCustomerId   = null;
  let selectedCustomerDue  = 0;

  function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type}`;
    setTimeout(() => { alert.className = 'alert'; }, 3000);
  }

  function showModalAlert(message, type) {
    const alert = document.getElementById('modalAlert');
    alert.textContent = message;
    alert.className = `alert alert-${type}`;
    setTimeout(() => { alert.className = 'alert'; }, 3000);
  }

  async function loadCreditCustomers() {
    try {
      const response = await authFetch('/api/payments/credit-customers');
      const result   = await response.json();

      document.getElementById('creditCount').textContent      = result.count || 0;
      document.getElementById('totalOutstanding').textContent =
        '₹' + (result.totalOutstanding || 0);

      const tbody = document.getElementById('creditList');

      if (!result.data || result.data.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="5" class="empty-state">
              No outstanding credit. All customers are clear.
            </td>
          </tr>`;
        return;
      }

      tbody.innerHTML = result.data.map(c => `
        <tr>
          <td><strong>${c.name}</strong></td>
          <td>${c.phone}</td>
          <td>₹${c.totalPurchases}</td>
          <td class="amount-due">₹${c.outstandingCredit}</td>
          <td>
            <button class="btn-primary"
              onclick="openPaymentModal('${c._id}', '${c.name}', ${c.outstandingCredit})">
              Record Payment
            </button>
          </td>
        </tr>
      `).join('');

    } catch (error) {
      showAlert('Failed to load credit customers', 'error');
    }
  }

  async function openPaymentModal(customerId, name, due) {
    selectedCustomerId  = customerId;
    selectedCustomerDue = due;

    document.getElementById('modalCustomerName').textContent = name;
    document.getElementById('modalDue').textContent          = due;
    document.getElementById('payAmount').value               = '';
    document.getElementById('payNote').value                 = '';
    document.getElementById('modalAlert').className          = 'alert';

    await loadPaymentHistory(customerId);

    document.getElementById('modalOverlay').classList.add('open');
  }

  async function loadPaymentHistory(customerId) {
    try {
      const response = await authFetch(`/api/payments/customer/${customerId}`);
      const result   = await response.json();

      const container = document.getElementById('paymentHistory');

      if (!result.data || result.data.length === 0) {
        container.innerHTML =
          '<p style="font-size:0.8rem;color:#9ca3af;">No payments recorded yet</p>';
        return;
      }

      container.innerHTML = result.data.map(p => `
        <div class="history-item">
          <span>${new Date(p.createdAt).toLocaleDateString('en-IN')} — ${p.method}</span>
          <span class="paid">+₹${p.amount}</span>
        </div>
      `).join('');

    } catch (error) {
      document.getElementById('paymentHistory').innerHTML =
        '<p style="font-size:0.8rem;color:#9ca3af;">Could not load history</p>';
    }
  }

  async function submitPayment() {
    const amount = parseFloat(document.getElementById('payAmount').value);
    const method = document.getElementById('payMethod').value;
    const note   = document.getElementById('payNote').value.trim();

    if (!amount || amount <= 0) {
      showModalAlert('Please enter a valid amount', 'error');
      return;
    }

    if (amount > selectedCustomerDue) {
      showModalAlert(
        `Amount cannot exceed outstanding credit of ₹${selectedCustomerDue}`,
        'error'
      );
      return;
    }

    try {
      const response = await authFetch('/api/payments', {
        method: 'POST',
        body: JSON.stringify({
          customerId: selectedCustomerId,
          amount,
          method,
          note
        })
      });

      const result = await response.json();

      if (!response.ok) {
        showModalAlert(result.error || 'Failed to record payment', 'error');
        return;
      }

      closeModalDirect();
      showAlert(
        `Payment of ₹${amount} recorded. Remaining: ₹${result.data.remainingCredit}`,
        'success'
      );
      loadCreditCustomers();

    } catch (error) {
      showModalAlert('Something went wrong', 'error');
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) {
      closeModalDirect();
    }
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
    selectedCustomerId  = null;
    selectedCustomerDue = 0;
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModalDirect();
  });

  loadCreditCustomers();
</script>

</body>
</html>
