<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SmartShop ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111;
    }

    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    nav a {
      font-size: 0.85rem;
      color: #6b7280;
      text-decoration: none;
      margin-left: 1.5rem;
    }

    nav a:hover { color: #111; }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.85rem;
      color: #6b7280;
    }

    button.logout {
      padding: 0.35rem 0.75rem;
      background: none;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      color: #6b7280;
    }

    .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }

    .page-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.25rem;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: #6b7280;
      margin-bottom: 0.5rem;
    }

    .stat-card .value {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .stat-card .sub {
      font-size: 0.75rem;
      color: #9ca3af;
    }

    .stat-card.red   .value { color: #dc2626; }
    .stat-card.amber .value { color: #d97706; }

    /* Bottom Grid */
    .bottom-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1rem;
    }

    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.25rem;
    }

    .card h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    /* Chart */
    .chart-container {
      position: relative;
      height: 220px;
    }

    /* Top Products List */
    .product-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.875rem;
    }

    .product-item:last-child { border-bottom: none; }

    .product-item .rank {
      font-size: 0.75rem;
      color: #9ca3af;
      width: 20px;
    }

    .product-item .name { flex: 1; margin-left: 0.5rem; }

    .product-item .sold {
      font-size: 0.75rem;
      color: #6b7280;
      background: #f3f4f6;
      padding: 0.15rem 0.5rem;
      border-radius: 999px;
    }

    /* Low Stock List */
    .low-stock-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.875rem;
    }

    .low-stock-item:last-child { border-bottom: none; }
    .low-stock-item .stock-num { color: #dc2626; font-weight: 500; }

    .empty { font-size: 0.85rem; color: #9ca3af; text-align: center; padding: 1rem 0; }
  </style>
</head>
<body>

<header>
  <h1>SmartShop ERP</h1>
  <nav>
    <a href="/pages/dashboard.html">Dashboard</a>
    <a href="/pages/products.html">Inventory</a>
    <a href="/pages/customers.html">Customers</a>
    <a href="/pages/billing.html">Billing</a>
    <a href="/pages/invoices.html">Invoices</a>
    <a href="/pages/udhaar.html">Udhaar</a>
  </nav>
  <div class="header-right">
    <span id="userName"></span>
    <button class="logout" onclick="logout()">Sign out</button>
  </div>
</header>

<div class="container">
  <div class="page-title">Dashboard</div>

  <!-- Stats Row -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="label">Today's Sales</div>
      <div class="value" id="todaySales">₹—</div>
      <div class="sub" id="todayBills">— bills today</div>
    </div>
    <div class="stat-card">
      <div class="label">This Month</div>
      <div class="value" id="monthRevenue">₹—</div>
      <div class="sub" id="monthBills">— bills this month</div>
    </div>
    <div class="stat-card red">
      <div class="label">Outstanding Credit</div>
      <div class="value" id="totalCredit">₹—</div>
      <div class="sub" id="creditCustomers">— customers</div>
    </div>
    <div class="stat-card amber">
      <div class="label">Low Stock Items</div>
      <div class="value" id="lowStockCount">—</div>
      <div class="sub" id="totalProducts">— total products</div>
    </div>
  </div>

  <!-- Charts + Lists Row -->
  <div class="bottom-grid">

    <!-- Revenue Chart -->
    <div class="card">
      <h3>Revenue — Last 7 Days</h3>
      <div class="chart-container">
        <canvas id="revenueChart"></canvas>
      </div>
    </div>

    <!-- Right Column -->
    <div style="display:flex;flex-direction:column;gap:1rem;">

      <!-- Top Products -->
      <div class="card">
        <h3>Top Products</h3>
        <div id="topProducts">
          <p class="empty">Loading...</p>
        </div>
      </div>

      <!-- Low Stock -->
      <div class="card">
        <h3>Low Stock Alert</h3>
        <div id="lowStockList">
          <p class="empty">Loading...</p>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Chart.js from CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="/js/auth.js"></script>
<script>
  if (!requireAuth()) throw new Error('Not authenticated');

  // Show username in header
  const user = getUser();
  if (user) document.getElementById('userName').textContent = user.name;

  let revenueChartInstance = null;

  async function loadStats() {
    try {
      const response = await authFetch('/api/dashboard/stats');
      const result   = await response.json();
      const d        = result.data;

      document.getElementById('todaySales').textContent    = '₹' + d.todaySales;
      document.getElementById('todayBills').textContent    = d.todayBills + ' bills today';
      document.getElementById('monthRevenue').textContent  = '₹' + d.monthRevenue;
      document.getElementById('monthBills').textContent    = d.monthBills + ' bills this month';
      document.getElementById('totalCredit').textContent   = '₹' + d.totalCredit;
      document.getElementById('creditCustomers').textContent = d.creditCustomers + ' customers';
      document.getElementById('lowStockCount').textContent = d.lowStockCount;
      document.getElementById('totalProducts').textContent = d.totalProducts + ' total products';

      // Low stock list
      const lowStockEl = document.getElementById('lowStockList');
      if (d.lowStockItems.length === 0) {
        lowStockEl.innerHTML = '<p class="empty">All products well stocked</p>';
      } else {
        lowStockEl.innerHTML = d.lowStockItems.map(p => `
          <div class="low-stock-item">
            <span>${p.name}</span>
            <span class="stock-num">${p.stock} left</span>
          </div>
        `).join('');
      }

    } catch (error) {
      console.error('Failed to load stats', error);
    }
  }

  async function loadChart() {
    try {
      const response = await authFetch('/api/dashboard/chart');
      const result   = await response.json();
      const { labels, values } = result.data;

      const ctx = document.getElementById('revenueChart').getContext('2d');

      if (revenueChartInstance) {
        revenueChartInstance.destroy();
      }

      revenueChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'Revenue (₹)',
            data: values,
            backgroundColor: '#111',
            borderRadius: 4,
            borderSkipped: false,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f3f4f6' },
              ticks: {
                font: { size: 11 },
                callback: val => '₹' + val
              }
            },
            x: {
              grid: { display: false },
              ticks: { font: { size: 11 } }
            }
          }
        }
      });

    } catch (error) {
      console.error('Failed to load chart', error);
    }
  }

  async function loadTopProducts() {
    try {
      const response = await authFetch('/api/dashboard/top-products');
      const result   = await response.json();

      const el = document.getElementById('topProducts');

      if (!result.data || result.data.length === 0) {
        el.innerHTML = '<p class="empty">No sales data yet</p>';
        return;
      }

      el.innerHTML = result.data.map((p, i) => `
        <div class="product-item">
          <span class="rank">${i + 1}</span>
          <span class="name">${p._id}</span>
          <span class="sold">${p.totalSold} sold</span>
        </div>
      `).join('');

    } catch (error) {
      console.error('Failed to load top products', error);
    }
  }

  loadStats();
  loadChart();
  loadTopProducts();
</script>

</body>
</html>
