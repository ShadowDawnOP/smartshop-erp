<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products — SmartShop ERP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f9fafb;
      color: #111;
    }
 
    header {
      background: white;
      border-bottom: 1px solid #e5e7eb;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
 
    header h1 { font-size: 1.1rem; font-weight: 600; }
 
    nav a {
      font-size: 0.85rem;
      color: #6b7280;
      text-decoration: none;
      margin-left: 1.5rem;
    }
 
    nav a:hover { color: #111; }
 
    .container { max-width: 1000px; margin: 2rem auto; padding: 0 1.5rem; }
 
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
 
    .top-bar h2 { font-size: 1.2rem; font-weight: 600; }
 
    button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 500;
    }
 
    .btn-primary { background: #111; color: white; }
    .btn-primary:hover { background: #333; }
    .btn-danger { background: #fef2f2; color: #dc2626; }
    .btn-danger:hover { background: #fee2e2; }
 
    .form-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: none;
    }
 
    .form-card.open { display: block; }
    .form-card h3 { font-size: 1rem; margin-bottom: 1rem; }
 
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
 
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; color: #6b7280; font-weight: 500; }
 
    .form-group input, .form-group select {
      padding: 0.5rem 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.875rem;
      outline: none;
    }
 
    .form-group input:focus, .form-group select:focus {
      border-color: #111;
    }
 
    .form-actions { display: flex; gap: 0.5rem; }
 
    .table-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      overflow: hidden;
    }
 
    table { width: 100%; border-collapse: collapse; }
    thead { background: #f9fafb; }
 
    th {
      text-align: left;
      padding: 0.75rem 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #e5e7eb;
    }
 
    td {
      padding: 0.875rem 1rem;
      font-size: 0.875rem;
      border-bottom: 1px solid #f3f4f6;
    }
 
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }
 
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }
 
    .badge-low { background: #fef2f2; color: #dc2626; }
    .badge-ok { background: #f0fdf4; color: #16a34a; }
 
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: 0.9rem;
    }
 
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-bottom: 1rem;
      display: none;
    }
 
    .alert-error { background: #fef2f2; color: #dc2626; display: block; }
    .alert-success { background: #f0fdf4; color: #16a34a; display: block; }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: #9ca3af;
      font-size: 0.875rem;
      gap: 0.5rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #111;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
 
<header>
  <h1>SmartShop ERP</h1>
  <nav>
    <a href="/pages/index.html">Home</a>
    <a href="/pages/products.html">Inventory</a>
    <a href="/pages/customers.html">Customers</a>
    <a href="/pages/billing.html">Billing</a>
    <a href="/pages/invoices.html">Invoices</a>
    <a href="/pages/udhaar.html">Udhaar</a>
  </nav>
</header>
 
<div class="container">
  <div class="top-bar">
    <h2>Products</h2>
    <div style="display:flex;gap:0.5rem;align-items:center;">
      <input type="search" id="searchInput" placeholder="Search products..."
        style="padding:0.5rem 0.75rem;border:1px solid #e5e7eb;
              border-radius:6px;font-size:0.875rem;outline:none;width:200px;">
      <select id="categoryFilter"
        style="padding:0.5rem 0.75rem;border:1px solid #e5e7eb;
              border-radius:6px;font-size:0.875rem;outline:none;">
        <option value="">All Categories</option>
        <option value="Groceries">Groceries</option>
        <option value="Household">Household</option>
        <option value="Beverages">Beverages</option>
        <option value="Snacks">Snacks</option>
      </select>
      <select id="stockFilter"
        style="padding:0.5rem 0.75rem;border:1px solid #e5e7eb;
              border-radius:6px;font-size:0.875rem;outline:none;">
        <option value="">All Stock</option>
        <option value="low">Low Stock</option>
        <option value="out">Out of Stock</option>
      </select>
      <button onclick="exportCSV()"
        style="padding:0.5rem 1rem;border:1px solid #e5e7eb;
              border-radius:6px;background:white;font-size:0.875rem;
              cursor:pointer;font-weight:500;">
      </button>
      <button class="btn-primary" onclick="toggleForm()">+ Add Product</button>
    </div>
  </div>
  
  <div id="alert" class="alert"></div>
 
  <div class="form-card" id="productForm">
    <h3>New Product</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="name" placeholder="e.g. Tata Salt">
      </div>
      <div class="form-group">
        <label>Category</label>
        <input type="text" id="category" placeholder="e.g. Groceries">
      </div>
      <div class="form-group">
        <label>Price (₹)</label>
        <input type="number" id="price" placeholder="0">
      </div>
      <div class="form-group">
        <label>Stock Quantity</label>
        <input type="number" id="stock" placeholder="0">
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-primary" onclick="createProduct()">Save Product</button>
      <button onclick="toggleForm()" style="background:#f3f4f6;">Cancel</button>
    </div>
  </div>
 
  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Category</th>
          <th>Price</th>
          <th>Stock</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="productList">
        <tr>
          <td colspan="6" class="empty-state">Loading products...</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
 
<!-- Load auth utility first, then page logic -->
<script src="/js/auth.js"></script>
<script>
  // Redirect to login if not authenticated
  if (!requireAuth()) throw new Error('Not authenticated');
 
  function toggleForm() {
    const form = document.getElementById('productForm');
    form.classList.toggle('open');
  }
 
  function showAlert(message, type) {
    const alert = document.getElementById('alert');
    alert.textContent = message;
    alert.className = `alert alert-${type}`;
    setTimeout(() => { alert.className = 'alert'; }, 3000);
  }
 
  let searchTimeout = null;

  async function loadProducts() {
    try {
      const search   = document.getElementById('searchInput').value.trim();
      const category = document.getElementById('categoryFilter').value;
      const status   = document.getElementById('stockFilter').value;

      let url = '/api/products?limit=50';
      if (search)   url += `&search=${encodeURIComponent(search)}`;
      if (category) url += `&category=${encodeURIComponent(category)}`;
      if (status)   url += `&status=${status}`;

      const response = await authFetch(url);
      const result   = await response.json();

      const tbody = document.getElementById('productList');

      if (!result.data || result.data.length === 0) {
        tbody.innerHTML = `
        <tr>
          <td colspan="6" class="empty-state">
            No products found.<br>
            <span style="font-size:0.8rem;">
              Try adjusting your search or add a new product.
            </span>
          </td>
        </tr>`;
        return;
      }

      tbody.innerHTML = result.data.map(product => `
        <tr>
          <td><strong>${product.name}</strong></td>
          <td>${product.category}</td>
          <td>₹${product.price}</td>
          <td>${product.stock} ${product.unit}</td>
          <td>
            <span class="badge ${product.isLowStock ? 'badge-low' : 'badge-ok'}">
              ${product.isLowStock ? 'Low Stock' : 'In Stock'}
            </span>
          </td>
          <td>
            <button class="btn-danger" onclick="deleteProduct('${product._id}')">
              Delete
            </button>
          </td>
        </tr>
      `).join('');

    } catch (error) {
      showAlert('Failed to load products', 'error');
    }
  }

  // Add event listeners for live filtering
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(loadProducts, 400);
  });

  document.getElementById('categoryFilter').addEventListener('change', loadProducts);
  document.getElementById('stockFilter').addEventListener('change', loadProducts);
    async function exportCSV() {
      const token    = getToken();
      const response = await fetch('/api/export/products', {
        headers: { Authorization: `Bearer ${token}` }
      });

      const blob      = await response.blob();
      const url       = URL.createObjectURL(blob);
      const link      = document.createElement('a');
      link.href       = url;
      link.download   = 'products.csv';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }
 
  async function createProduct() {
    const name     = document.getElementById('name').value.trim();
    const category = document.getElementById('category').value.trim();
    const price    = document.getElementById('price').value;
    const stock    = document.getElementById('stock').value;
 
    if (!name || !category || !price || !stock) {
      showAlert('Please fill in all fields', 'error');
      return;
    }
 
    try {
      const response = await authFetch('/api/products', {
        method: 'POST',
        body: JSON.stringify({ name, category, price, stock })
      });
 
      const result = await response.json();
 
      if (!response.ok) {
        showAlert(result.error || 'Failed to create product', 'error');
        return;
      }
 
      showAlert('Product added successfully', 'success');
      toggleForm();
 
      ['name', 'category', 'price', 'stock'].forEach(id => {
        document.getElementById(id).value = '';
      });
 
      loadProducts();
 
    } catch (error) {
      showAlert('Something went wrong', 'error');
    }
  }
 
  async function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
 
    try {
      const response = await authFetch(`/api/products/${id}`, {
        method: 'DELETE'
      });
 
      const result = await response.json();
 
      if (!response.ok) {
        showAlert(result.error || 'Failed to delete', 'error');
        return;
      }
 
      showAlert('Product deleted', 'success');
      loadProducts();
 
    } catch (error) {
      showAlert('Something went wrong', 'error');
    }
  }
 
  loadProducts();
</script>
 
</body>
</html>
